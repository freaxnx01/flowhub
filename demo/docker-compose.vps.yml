# VPS-DE (IONOS) override — aligns the demo's Traefik labels with the host's Traefik.
# The base demo/docker-compose.yml ships generic labels (websecure / letsencrypt /
# traefik_public); the freaxnx01 VPS-DE Traefik uses entrypoint `web-secure`,
# certresolver `default`, and the external proxy network `web`. Set TRAEFIK_NETWORK=web
# in .env so the external-network reference resolves to it.
#
# Deploy:
#   docker compose -f docker-compose.yml -f demo/docker-compose.yml -f demo/docker-compose.vps.yml up --build -d --wait
services:
  flowhub.web:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.flowhub-demo.rule=Host(`demo.flowhub.freaxnx01.ch`)"
      - "traefik.http.routers.flowhub-demo.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-demo.tls=true"
      - "traefik.http.routers.flowhub-demo.tls.certresolver=default"
      - "traefik.http.routers.flowhub-demo.middlewares=flowhub-demo-ratelimit@docker,flowhub-demo-headers@docker"
      - "traefik.http.services.flowhub-demo.loadbalancer.server.port=5070"
      - "traefik.http.middlewares.flowhub-demo-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.flowhub-demo-ratelimit.ratelimit.burst=20"
      - "traefik.http.middlewares.flowhub-demo-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.flowhub-demo-headers.headers.framedeny=true"
      - "traefik.http.middlewares.flowhub-demo-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.flowhub-demo-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.flowhub-demo-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      # Block the public /metrics route at the edge (see base demo/docker-compose.yml).
      # Prometheus scrapes it internally over `backend`, never through Traefik.
      - "traefik.http.routers.flowhub-demo-metrics.rule=Host(`demo.flowhub.freaxnx01.ch`) && PathPrefix(`/metrics`)"
      - "traefik.http.routers.flowhub-demo-metrics.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-demo-metrics.tls=true"
      - "traefik.http.routers.flowhub-demo-metrics.tls.certresolver=default"
      - "traefik.http.routers.flowhub-demo-metrics.priority=100"
      - "traefik.http.routers.flowhub-demo-metrics.service=flowhub-demo"
      - "traefik.http.routers.flowhub-demo-metrics.middlewares=flowhub-demo-noexternal@docker"
      - "traefik.http.middlewares.flowhub-demo-noexternal.ipallowlist.sourcerange=127.0.0.1/32"
      - "traefik.docker.network=web"

  vikunja:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.flowhub-vikunja.rule=Host(`vikunja.demo.flowhub.freaxnx01.ch`)"
      - "traefik.http.routers.flowhub-vikunja.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-vikunja.tls=true"
      - "traefik.http.routers.flowhub-vikunja.tls.certresolver=default"
      - "traefik.http.routers.flowhub-vikunja.middlewares=flowhub-vikunja-ratelimit@docker"
      - "traefik.http.services.flowhub-vikunja.loadbalancer.server.port=3456"
      - "traefik.http.middlewares.flowhub-vikunja-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.flowhub-vikunja-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.flowhub-vikunja-ratelimit.ratelimit.period=1m"
      - "traefik.docker.network=web"

  wallabag:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.flowhub-wallabag.rule=Host(`wallabag.demo.flowhub.freaxnx01.ch`)"
      - "traefik.http.routers.flowhub-wallabag.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-wallabag.tls=true"
      - "traefik.http.routers.flowhub-wallabag.tls.certresolver=default"
      - "traefik.http.routers.flowhub-wallabag.middlewares=flowhub-wallabag-ratelimit@docker"
      - "traefik.http.services.flowhub-wallabag.loadbalancer.server.port=80"
      - "traefik.http.middlewares.flowhub-wallabag-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.flowhub-wallabag-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.flowhub-wallabag-ratelimit.ratelimit.period=1m"
      - "traefik.docker.network=web"

  paperless:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.flowhub-paperless.rule=Host(`paperless.demo.flowhub.freaxnx01.ch`)"
      - "traefik.http.routers.flowhub-paperless.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-paperless.tls=true"
      - "traefik.http.routers.flowhub-paperless.tls.certresolver=default"
      - "traefik.http.routers.flowhub-paperless.middlewares=flowhub-paperless-ratelimit@docker"
      - "traefik.http.services.flowhub-paperless.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.flowhub-paperless-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.flowhub-paperless-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.flowhub-paperless-ratelimit.ratelimit.period=1m"
      - "traefik.docker.network=web"

  uptime-kuma:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.flowhub-status.rule=Host(`status.demo.flowhub.freaxnx01.ch`)"
      - "traefik.http.routers.flowhub-status.entrypoints=web-secure"
      - "traefik.http.routers.flowhub-status.tls=true"
      - "traefik.http.routers.flowhub-status.tls.certresolver=default"
      - "traefik.http.routers.flowhub-status.middlewares=flowhub-status-ratelimit@docker"
      - "traefik.http.services.flowhub-status.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.flowhub-status-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.flowhub-status-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.flowhub-status-ratelimit.ratelimit.period=1m"
      - "traefik.docker.network=web"
