name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write        # test-reporter publishes a Check run with the test list

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore FlowHub.slnx

      - name: Build
        run: dotnet build FlowHub.slnx --no-restore --configuration Release

      - name: Test
        # Coverage notes:
        # 1. `--settings coverlet.runsettings` is mandatory — without it the
        #    [CompilerGenerated|GeneratedCode|ExcludeFromCodeCoverage] exclusions
        #    don't fire and the denominator balloons with state-machine types +
        #    source-generated OpenAPI helpers (Web/Api drop ~30%).
        # 2. We intentionally drop `--no-build --configuration Release` here:
        #    coverlet's XPlat data collector misses FlowHub.AI's lines under
        #    Release-mode optimisation (other assemblies work fine, but AI's
        #    Microsoft.Extensions.AI / OpenAI / Anthropic.SDK glue trips it up).
        #    Running this step in Debug means a rebuild — the wall-clock cost
        #    (~30s) is the price of trustworthy coverage numbers. Keep in sync
        #    with `just test-coverage` (same invocation, no --no-build).
        run: |
          dotnet test FlowHub.slnx \
            --filter "Category!=AI&Category!=BetaSmoke&Category!=E2E" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage \
            --logger "trx"

      - name: Drop empty test results
        if: always()
        # Projects whose tests are all category-gated out of CI (AI / BetaSmoke / E2E)
        # still emit a 0-result .trx → a noisy "No tests found" row in the report.
        # Remove those so the report lists only suites that actually ran.
        run: |
          find coverage -name '*.trx' | while read -r f; do
            if grep -q 'total="0"' "$f"; then
              echo "removing empty result file: $f"
              rm -f "$f"
            fi
          done

      # --- Reporting -----------------------------------------------------------
      # The summary below renders on the run page (Actions → this run). It covers
      # the default CI suite only: unit + bUnit component + non-live integration.
      # Deliberately excluded (run on demand, see docs/spec/testing-strategy.md):
      #   Category=E2E      → FlowHub.Web.E2ETests (Playwright; needs Chromium + server)
      #   Category=AI       → FlowHub.AI.IntegrationTests (needs live LLM keys)
      #   Category=BetaSmoke→ live skill-integration smoke tests

      - name: Scope note
        if: always()
        run: |
          {
            echo "## FlowHub CI — test & coverage"
            echo ""
            echo "**Suite:** unit + bUnit component + non-live integration."
            echo "**Excluded (on-demand):** E2E (Playwright), AI-live, BetaSmoke — see \`docs/spec/testing-strategy.md\`."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: dotnet tests
          path: "coverage/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      - name: Coverage summary
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"MarkdownSummaryGithub;Html" || exit 0
          if [ -f coverage/report/SummaryGithub.md ]; then
            cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # Per-assembly coverage floor — fails the job on regression.
      # See docs/spec/coverage-gate.md for thresholds rationale and how to
      # ratchet them upward as new tests land.
      - name: Coverage gate
        if: always()
        run: |
          pip install --quiet --user defusedxml
          python3 tools/check-coverage.py \
            --reports 'coverage/**/coverage.cobertura.xml' \
            --thresholds coverage.thresholds.json \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "coverage/**/*.trx"
