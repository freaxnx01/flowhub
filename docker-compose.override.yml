# Dev/demo overrides — DemoAuthHandler activates (no Auth__OIDC__* env vars set).
# Exposes all ports for local access.

services:
  flowhub.web:
    ports:
      - "5070:5070"
    environment:
      Serilog__MinimumLevel: Debug
      # E2E fault-injection endpoints (used by Playwright J26 + J28). Dev-only.
      FLOWHUB_E2E_FAULTS_ENABLED: "true"

  postgres:
    ports:
      - "5432:5432"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"
