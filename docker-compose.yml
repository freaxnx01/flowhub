# Production-oriented Docker Compose stack for FlowHub.
# Override file (docker-compose.override.yml) configures demo/dev mode (DemoAuthHandler, exposed ports).

services:
  flowhub.web:
    build:
      context: .
      dockerfile: source/FlowHub.Web/Dockerfile
    image: flowhub:local
    environment:
      ASPNETCORE_URLS: "http://+:5070"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=flowhub;Username=flowhub;Password=${POSTGRES_PASSWORD:-dev-secret}"
      # In-memory bus is the default (single-process). For durable, crash-safe
      # redelivery across a broker, add the RabbitMQ overlay:
      #   docker compose -f docker-compose.yml -f docker-compose.rabbitmq.yml up
      Bus__Transport: ${Bus__Transport:-InMemory}
      Embeddings__BaseUrl: ${Embeddings__BaseUrl:-}
      Embeddings__ApiKey: ${Embeddings__ApiKey:-}
      Embeddings__Model: ${Embeddings__Model:-}
      Embeddings__Dimensions: ${Embeddings__Dimensions:-}
      Ai__Provider: ${Ai__Provider:-}
      Ai__Anthropic__ApiKey: ${Ai__Anthropic__ApiKey:-}
      Ai__Anthropic__Model: ${Ai__Anthropic__Model:-}
      Ai__OpenRouter__ApiKey: ${Ai__OpenRouter__ApiKey:-}
      Ai__OpenRouter__Model: ${Ai__OpenRouter__Model:-}
      Auth__OIDC__Authority: ${Auth__OIDC__Authority:-}
      Auth__OIDC__ClientId: ${Auth__OIDC__ClientId:-}
      Auth__OIDC__ClientSecret: ${Auth__OIDC__ClientSecret:-}
    depends_on:
      flowhub.migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5070/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  flowhub.migrations:
    build:
      context: .
      dockerfile: docker/migrations/Dockerfile
    image: flowhub-migrations:local
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=flowhub;Username=flowhub;Password=${POSTGRES_PASSWORD:-dev-secret}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: flowhub
      POSTGRES_USER: flowhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowhub -d flowhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/monitoring/grafana:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
